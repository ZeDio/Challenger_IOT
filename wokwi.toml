[wokwi]
version = 1
elf = "sketch/build/esp32.esp32.esp32doit-devkit-v1/sketch.ino.elf"
firmware = "sketch/build/esp32.esp32.esp32doit-devkit-v1/sketch.ino.bin"

# WiFi Configuration
[[wifi]]
ssid = "Wokwi-GUEST"
password = ""
internet = true
channel = 6

# Forward http://localhost:8280 to port 80 on the simulated ESP32:
[[net.forward]]
from = "0.0.0.0:8280"
to = "target:80"